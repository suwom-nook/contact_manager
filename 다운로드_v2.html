<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>다운로드</title>
<style>
body{font-family:'Apple SD Gothic Neo',sans-serif;background:#0d1117;color:#e6edf3;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;}
.box{text-align:center;padding:40px 50px;background:#161b22;border:1px solid #30363d;border-radius:14px;}
h2{margin-bottom:8px;font-size:20px;}p{color:#8b949e;font-size:13px;margin-bottom:24px;}
.btn{display:inline-flex;align-items:center;gap:8px;padding:12px 28px;background:#1f6feb;color:#fff;border:none;border-radius:8px;font-size:15px;font-family:inherit;cursor:pointer;text-decoration:none;}
.btn:hover{background:#388bfd;}
.note{margin-top:16px;font-size:12px;color:#6e7681;}
</style>
</head>
<body>
<div class="box">
  <h2>🏛️ 인맥 관리 시스템 v2</h2>
  <p>모바일 최적화 + 일정 관리 + 구글 캘린더 연동<br>파일을 다운로드 후 <strong>index.html</strong>로 이름 변경하세요</p>
  <a class="btn" id="dl">⬇️ index.html 다운로드</a>
  <div class="note">변경사항: 하단 네비게이션 · 일정 탭 · 캘린더 뷰 · 구글캘린더 추가 버튼 · 파일 첨부 · 참석인원 자유입력 · 메모</div>
</div>
<script>
const b64 =  + b64 + ;
const bin = atob(b64);
const arr = new Uint8Array(bin.length);
for(let i=0;i<bin.length;i++) arr[i]=bin.charCodeAt(i);
const blob = new Blob([arr],{type:text/html});
const url = URL.createObjectURL(blob);
document.getElementById(dl).href = url;
document.getElementById(dl).download = index.html;
</script>
</body>
</html>
