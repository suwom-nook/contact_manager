<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>인맥 관리 시스템</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=Noto+Serif+KR:wght@400;600&display=swap');
:root{
  --bg:#0d1117;--bg2:#161b22;--bg3:#1c2333;--bg4:#21262d;
  --border:#30363d;--border2:#3d4450;
  --text:#e6edf3;--text2:#8b949e;--text3:#6e7681;
  --accent:#58a6ff;--accent2:#1f6feb;
  --green:#3fb950;--red:#f85149;--yellow:#d29922;
  --purple:#bc8cff;--orange:#e3b341;--teal:#39d353;
  --radius:10px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}
/* TOPBAR */
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 16px;height:52px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:200;}
.topbar-logo{font-family:'Noto Serif KR',serif;font-size:16px;font-weight:600;color:var(--accent);white-space:nowrap;}
.topbar-search{flex:1;max-width:400px;position:relative;}
.topbar-search input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:6px 10px 6px 30px;color:var(--text);font-size:13px;font-family:inherit;outline:none;}
.topbar-search input:focus{border-color:var(--accent2);}
.topbar-search input::placeholder{color:var(--text3);}
.search-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:13px;pointer-events:none;}
.topbar-actions{margin-left:auto;display:flex;gap:6px;}
/* DESKTOP TABS */
.view-tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);padding:0 16px;overflow-x:auto;}
.view-tab{padding:10px 16px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:none;color:var(--text2);font-family:inherit;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;display:flex;align-items:center;gap:5px;white-space:nowrap;}
.view-tab:hover{color:var(--text);}
.view-tab.active{color:var(--accent);border-bottom-color:var(--accent);}
/* MOBILE BOTTOM NAV */
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);z-index:300;height:60px;}
.bottom-nav-inner{display:flex;height:100%;}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;background:none;border:none;color:var(--text3);font-family:inherit;font-size:10px;cursor:pointer;}
.bnav-btn.active{color:var(--accent);}
.bnav-icon{font-size:20px;line-height:1;}
/* LAYOUT */
.layout{display:flex;flex:1;height:calc(100vh - 104px);overflow:hidden;}
.sidebar{width:280px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;transition:transform .3s;}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:240;}
.sidebar-overlay.show{display:block;}
.sidebar-header{padding:10px 12px 8px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.sidebar-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text2);}
.person-count{font-size:11px;background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:2px 8px;color:var(--text2);}
.filter-bar{padding:7px 9px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:4px;}
.filter-row{display:flex;gap:4px;}
.filter-select{background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px;font-family:inherit;padding:5px 7px;width:100%;outline:none;}
.person-list{flex:1;overflow-y:auto;}
.person-item{display:flex;align-items:center;gap:9px;padding:9px 12px;cursor:pointer;border-left:3px solid transparent;transition:all .15s;}
.person-item:hover{background:var(--bg3);}
.person-item.active{background:rgba(31,111,235,.12);border-left-color:var(--accent);}
.avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0;border:2px solid;}
.person-info{flex:1;min-width:0;}
.person-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.person-meta{font-size:11px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;}
.influence-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
/* MAIN */
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column;}
/* DETAIL */
.detail-view{flex:1;padding:20px 24px;}
.detail-hero{display:flex;gap:16px;align-items:flex-start;margin-bottom:18px;flex-wrap:wrap;}
.detail-avatar{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;flex-shrink:0;border:3px solid;}
.detail-name{font-family:'Noto Serif KR',serif;font-size:22px;font-weight:600;margin-bottom:4px;}
.detail-role{font-size:13px;color:var(--text2);margin-bottom:8px;}
.tags{display:flex;flex-wrap:wrap;gap:4px;}
.tag{display:inline-flex;align-items:center;gap:3px;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:500;border:1px solid;}
.tag-blue{background:rgba(88,166,255,.12);border-color:rgba(88,166,255,.4);color:var(--accent);}
.tag-green{background:rgba(63,185,80,.12);border-color:rgba(63,185,80,.4);color:var(--green);}
.tag-yellow{background:rgba(210,153,34,.12);border-color:rgba(210,153,34,.4);color:var(--yellow);}
.tag-purple{background:rgba(188,140,255,.12);border-color:rgba(188,140,255,.4);color:var(--purple);}
.section-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:14px;}
.section-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text2);margin-bottom:12px;}
.influence-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;}
.influence-item{display:flex;flex-direction:column;gap:4px;}
.influence-label{font-size:12px;color:var(--text2);}
.influence-bar{height:5px;background:var(--bg3);border-radius:3px;overflow:hidden;}
.influence-fill{height:100%;border-radius:3px;transition:width .6s ease;}
.influence-value{font-size:11px;font-weight:600;display:flex;justify-content:space-between;}
.events-grid{display:flex;flex-wrap:wrap;gap:7px;}
.event-badge{display:inline-flex;align-items:center;gap:5px;padding:6px 11px;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;border:2px solid;transition:all .2s;user-select:none;}
.event-badge.active{opacity:1;}
.event-badge:not(.active){opacity:.35;filter:grayscale(.5);}
.relation-item{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border);}
.relation-item:last-child{border-bottom:none;}
.rel-name{width:80px;font-size:13px;font-weight:500;flex-shrink:0;cursor:pointer;color:var(--accent);}
.closeness-track{flex:1;height:7px;background:var(--bg3);border-radius:4px;cursor:pointer;}
.closeness-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--accent2),var(--purple));transition:width .3s;}
.closeness-value{width:30px;font-size:11px;font-weight:600;color:var(--text2);text-align:right;}
.meeting-card{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:11px;margin-bottom:8px;border-left:3px solid var(--accent2);}
.meeting-date{font-size:12px;color:var(--accent);font-weight:600;}
.meeting-details{display:flex;gap:12px;margin:4px 0;flex-wrap:wrap;}
.meeting-detail-item{font-size:12px;color:var(--text2);}
.meeting-memo{font-size:13px;line-height:1.65;background:var(--bg4);border-radius:6px;padding:8px 10px;margin-top:6px;}
.meeting-eval{margin-top:5px;padding:6px 10px;background:rgba(63,185,80,.08);border:1px solid rgba(63,185,80,.2);border-radius:6px;font-size:12px;color:var(--green);}
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text3);gap:10px;padding:60px;}
/* BTN */
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:6px;font-size:13px;font-family:inherit;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--bg4);color:var(--text);transition:all .15s;white-space:nowrap;}
.btn:hover{background:var(--bg3);}
.btn-primary{background:var(--accent2);border-color:transparent;color:#fff;}
.btn-primary:hover{background:#388bfd;}
.btn-green{background:rgba(63,185,80,.15);border-color:var(--green);color:var(--green);}
.btn-red{background:rgba(248,81,73,.12);border-color:var(--red);color:var(--red);}
.btn-sm{padding:3px 8px;font-size:11px;}
.btn-gcal{background:rgba(66,133,244,.15);border-color:#4285f4;color:#4285f4;}
.btn-gcal:hover{background:rgba(66,133,244,.25);}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);display:flex;align-items:center;justify-content:center;z-index:1000;opacity:0;pointer-events:none;transition:opacity .2s;}
.modal-overlay.show{opacity:1;pointer-events:all;}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:14px;padding:22px;width:560px;max-width:96vw;max-height:88vh;overflow-y:auto;transform:translateY(20px);transition:transform .2s;box-shadow:0 8px 32px rgba(0,0,0,.4);}
.modal-overlay.show .modal{transform:translateY(0);}
.modal-title{font-family:'Noto Serif KR',serif;font-size:17px;font-weight:600;margin-bottom:16px;}
.form-group{margin-bottom:11px;}
.form-label{display:block;font-size:11px;font-weight:700;color:var(--text2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px;}
.form-input,.form-textarea,.form-select{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:8px 11px;color:var(--text);font-size:13px;font-family:inherit;outline:none;transition:border-color .2s;}
.form-input:focus,.form-textarea:focus,.form-select:focus{border-color:var(--accent2);}
.form-textarea{resize:vertical;min-height:68px;}
.form-row{display:flex;gap:8px;}
.form-row .form-group{flex:1;}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:16px;padding-top:12px;border-top:1px solid var(--border);}
.star-input{display:flex;gap:3px;}
.star-btn{font-size:20px;cursor:pointer;background:none;border:none;padding:0;}
/* GRID */
.grid-view{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;padding:16px;}
.grid-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px;cursor:pointer;transition:all .2s;}
.grid-card:hover{border-color:var(--accent2);transform:translateY(-2px);}
.grid-card-header{display:flex;align-items:center;gap:10px;margin-bottom:9px;}
/* NETWORK */
.network-view{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;}
.net-tooltip{position:absolute;background:var(--bg4);border:1px solid var(--border2);border-radius:6px;padding:6px 10px;font-size:12px;pointer-events:none;z-index:100;white-space:nowrap;display:none;}
/* CALENDAR */
.cal-wrap{flex:1;padding:16px 20px 20px;max-width:960px;width:100%;}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px;}
.cal-title{font-family:'Noto Serif KR',serif;font-size:20px;font-weight:600;}
.cal-nav{display:flex;gap:5px;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border);border-radius:10px;overflow:hidden;margin-bottom:18px;}
.cal-dh{background:var(--bg3);padding:7px 4px;text-align:center;font-size:11px;font-weight:700;color:var(--text2);}
.cal-dh.sun{color:var(--red);}
.cal-dh.sat{color:var(--accent);}
.cal-cell{background:var(--bg2);min-height:68px;padding:5px;cursor:pointer;transition:background .15s;position:relative;}
.cal-cell:hover{background:var(--bg3);}
.cal-cell.other{opacity:.3;}
.cal-cell.today .cal-dn{background:var(--accent2);color:#fff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;}
.cal-cell.has-ev::after{content:'';position:absolute;bottom:4px;left:50%;transform:translateX(-50%);width:5px;height:5px;border-radius:50%;background:var(--accent);}
.cal-dn{font-size:12px;font-weight:500;margin-bottom:2px;width:22px;height:22px;display:flex;align-items:center;justify-content:center;}
.cal-dn.sun{color:var(--red);}
.cal-dn.sat{color:var(--accent);}
.cal-chip{font-size:10px;background:rgba(31,111,235,.25);color:var(--accent);border-radius:3px;padding:1px 4px;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sched-list{display:flex;flex-direction:column;gap:10px;margin-top:4px;}
.sched-sec{font-size:13px;font-weight:700;color:var(--text2);margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border);}
.sched-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px;border-left:4px solid var(--accent2);}
.sched-card-hd{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:7px;}
.sched-ttl{font-size:15px;font-weight:600;}
.sched-meta{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:7px;}
.sched-mi{display:flex;align-items:center;gap:4px;font-size:12px;color:var(--text2);}
.sched-memo{font-size:13px;line-height:1.6;color:var(--text2);background:var(--bg3);border-radius:6px;padding:8px 10px;margin-bottom:8px;}
.sched-actions{display:flex;gap:6px;flex-wrap:wrap;}
.file-drop{border:2px dashed var(--border);border-radius:8px;padding:14px;text-align:center;cursor:pointer;transition:border-color .2s;}
.file-drop:hover{border-color:var(--accent2);}
.file-prev{display:flex;align-items:center;gap:8px;padding:8px;background:var(--bg3);border-radius:6px;margin-top:6px;font-size:12px;}
/* ADMIN */
.admin-wrap{flex:1;overflow-y:auto;padding:24px 28px;}
.admin-page-title{font-family:'Noto Serif KR',serif;font-size:21px;font-weight:600;margin-bottom:4px;}
.admin-page-sub{font-size:13px;color:var(--text2);margin-bottom:22px;}
.admin-sections{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:14px;margin-bottom:18px;}
.admin-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;}
.admin-card-title{font-size:13px;font-weight:700;margin-bottom:11px;}
.tag-list{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;min-height:30px;}
.editable-tag{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:20px;font-size:12px;}
.del-btn{background:none;border:none;color:var(--text3);cursor:pointer;font-size:15px;line-height:1;}
.del-btn:hover{color:var(--red);}
.add-tag-row{display:flex;gap:6px;}
.add-tag-input{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:6px 10px;color:var(--text);font-size:12px;font-family:inherit;outline:none;}
.add-tag-input:focus{border-color:var(--accent2);}
.region-preview-grid{display:flex;flex-wrap:wrap;gap:7px;}
.sido-chip{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:7px 11px;font-size:12px;cursor:pointer;transition:border-color .15s;}
.sido-chip:hover{border-color:var(--accent);}
.sido-chip.open{border-color:var(--accent);background:rgba(31,111,235,.08);}
.sido-chip-name{font-weight:600;margin-bottom:3px;}
.sido-chip-count{color:var(--text3);font-size:11px;}
.sigungu-list{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px;padding:8px;background:var(--bg3);border-radius:6px;max-height:100px;overflow-y:auto;}
.sigungu-item{font-size:11px;color:var(--text2);padding:2px 7px;background:var(--bg4);border-radius:4px;}
.divider{height:1px;background:var(--border);margin:16px 0;}
.no-results{text-align:center;padding:32px;color:var(--text3);font-size:13px;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.fade-in{animation:fadeIn .25s ease;}
@keyframes ldbar{0%{width:0%}60%{width:80%}100%{width:100%}}
/* FAB */
.fab{display:none;position:fixed;bottom:72px;right:16px;width:52px;height:52px;border-radius:50%;background:var(--accent2);border:none;color:#fff;font-size:26px;cursor:pointer;z-index:290;box-shadow:0 4px 16px rgba(0,0,0,.4);align-items:center;justify-content:center;}
/* MOBILE */
@media(max-width:768px){
  .view-tabs{display:none;}
  .bottom-nav{display:block;}
  .fab{display:flex;}
  .layout{height:calc(100vh - 52px - 60px);}
  .sidebar{position:fixed;top:52px;left:0;bottom:60px;width:82vw;max-width:300px;z-index:250;transform:translateX(-100%);box-shadow:4px 0 20px rgba(0,0,0,.5);}
  .sidebar.open{transform:translateX(0);}
  .main{width:100%;}
  .detail-view{padding:14px 14px 16px;}
  .cal-wrap{padding:12px 12px 16px;}
  .cal-cell{min-height:48px;padding:3px;}
  .cal-chip{display:none;}
  .grid-view{padding:10px;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));}
  .admin-wrap{padding:14px 14px 16px;}
  .admin-sections{grid-template-columns:1fr;}
  .form-row{flex-direction:column;}
  .modal{border-radius:14px 14px 0 0;position:fixed;bottom:0;left:0;right:0;max-height:90vh;width:100%;max-width:100%;}
  .modal-overlay{align-items:flex-end;}
  .topbar-search{max-width:none;}
  .pc-only{display:none;}
  #sidebarToggleBtn{display:flex!important;}
}
</style>
</head>
<body>
<div id="_lo" style="position:fixed;inset:0;background:#0d1117;display:flex;align-items:center;justify-content:center;z-index:9999;flex-direction:column;gap:16px;">
  <div style="font-size:36px;">🏛️</div>
  <div style="font-size:16px;font-family:'Noto Sans KR',sans-serif;color:#e6edf3;font-weight:600;">인맥 관리 시스템</div>
  <div style="font-size:13px;color:#8b949e;font-family:'Noto Sans KR',sans-serif;">Firebase 연결 중...</div>
  <div style="width:200px;height:3px;background:#21262d;border-radius:2px;overflow:hidden;margin-top:4px;">
    <div style="height:100%;background:linear-gradient(90deg,#1f6feb,#bc8cff);border-radius:2px;animation:ldbar 1.5s ease-in-out infinite;"></div>
  </div>
</div>

<div class="topbar">
  <button id="sidebarToggleBtn" onclick="toggleSidebar()" style="display:none;background:none;border:none;color:var(--text);font-size:20px;cursor:pointer;padding:4px 6px;">☰</button>
  <div class="topbar-logo">🏛️ 인맥관리</div>
  <div class="topbar-search">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="이름, 소속, 지역 검색...">
  </div>
  <div class="topbar-actions">
    <button class="btn btn-green pc-only" onclick="openAddPersonModal()">＋ 인물</button>
    <button class="btn btn-primary pc-only" id="addSchedBtnTop" style="display:none;" onclick="openAddScheduleModal()">＋ 일정</button>
  </div>
</div>

<div class="view-tabs">
  <button class="view-tab active" id="tab-list" onclick="switchView('list')">👤 인물 목록</button>
  <button class="view-tab" id="tab-grid" onclick="switchView('grid')">⊞ 카드</button>
  <button class="view-tab" id="tab-schedule" onclick="switchView('schedule')">📅 일정</button>
  <button class="view-tab" id="tab-network" onclick="switchView('network')">🕸 관계도</button>
  <button class="view-tab" id="tab-admin" onclick="switchView('admin')">⚙️ 관리자</button>
</div>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

<div class="layout" id="mainLayout">
  <div class="sidebar" id="sidebarEl">
    <div class="sidebar-header">
      <span class="sidebar-title">인물</span>
      <span class="person-count" id="personCount">0명</span>
    </div>
    <div class="filter-bar">
      <select class="filter-select" id="filterParty" onchange="applyFilters()"><option value="">전체 정당</option></select>
      <div class="filter-row">
        <select class="filter-select" id="filterSido" onchange="onSidoFilter()"><option value="">전체 광역</option></select>
        <select class="filter-select" id="filterSigungu" onchange="applyFilters()"><option value="">전체 시군구</option></select>

function showToast(msg,type='info'){
  let t=document.getElementById('_toast');
  if(!t){t=document.createElement('div');t.id='_toast';
    t.style.cssText='position:fixed;bottom:72px;left:50%;transform:translateX(-50%);padding:10px 18px;border-radius:8px;font-size:13px;z-index:9999;transition:opacity .3s;pointer-events:none;font-family:inherit;';
    document.body.appendChild(t);}
  t.textContent=msg;t.style.background=type==='error'?'#f85149':type==='success'?'#3fb950':'#58a6ff';
  t.style.color='#fff';t.style.opacity='1';clearTimeout(t._tid);t._tid=setTimeout(()=>t.style.opacity='0',2800);
}
function startRealtimeSync(){
  onSnapshot(doc(db,'app','data'),(snap)=>{
    if(snap.exists()){const d=snap.data();persons=d.persons||[];meetings=d.meetings||[];relations=d.relations||[];schedules=d.schedules||[];if(d.cats)cats=d.cats;}
    if(!_dbReady){_dbReady=true;document.getElementById('_lo').style.display='none';setupMobile();populateFilters();populateModal();renderPersonList();}
    else{renderPersonList();if(currentView==='grid')renderGridView();if(currentView==='schedule')renderScheduleView();if(selectedId)showDetail(selectedId);showToast('📡 동기화됨');}
  },(err)=>{
    document.getElementById('_lo').innerHTML='<div style="text-align:center;color:#f85149;font-size:14px;padding:20px;">⚠️ 연결 실패<br><small style="color:#8b949e;">Firebase 설정을 확인하세요</small></div>';
  });
}

// ── 인물 목록 ──
function renderPersonList(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  const party=document.getElementById('filterParty').value, sido=document.getElementById('filterSido').value;
  const sigungu=document.getElementById('filterSigungu').value, relT=document.getElementById('filterRelType').value;
  const inf=document.getElementById('filterInfluence').value;
  filteredPersons=persons.filter(p=>{
    if(q&&!p.name.toLowerCase().includes(q)&&!(p.company||'').toLowerCase().includes(q)&&!(p.sido||'').includes(q))return false;
    if(party&&p.party!==party)return false; if(sido&&p.sido!==sido)return false;
    if(sigungu&&p.sigungu!==sigungu)return false; if(relT&&p.relation!==relT)return false;
    if(inf&&p.politicalInfluence!==parseInt(inf))return false; return true;
  });
  document.getElementById('personCount').textContent=filteredPersons.length+'명';
  const list=document.getElementById('personList');
  if(!filteredPersons.length){list.innerHTML='<div class="no-results">검색 결과 없음</div>';return;}
  list.innerHTML=filteredPersons.map(p=>{
    const ac=getAC(p.name), ic=p.politicalInfluence>=4?'#f85149':p.politicalInfluence>=3?'#d29922':'#3fb950';
    return`<div class="person-item${selectedId===p.id?' active':''}" onclick="selectPerson('${p.id}')">
      <div class="avatar" style="background:${ac.bg};border-color:${ac.border};color:${ac.text}">${p.name.charAt(0)}</div>
      <div class="person-info"><div class="person-name">${p.name}</div><div class="person-meta">${[p.party,rf(p),p.duty].filter(Boolean).join(' · ')||'—'}</div></div>
      <div class="influence-dot" style="background:${ic}"></div>
    </div>`;
  }).join('');
}
function selectPerson(id){selectedId=id;renderPersonList();if(currentView==='list'){showDetail(id);if(isMobile())closeSidebar();}}
function applyFilters(){renderPersonList();if(currentView==='grid')renderGridView();}

// ── 일정 뷰 ──
function renderScheduleView(){
  const sv=document.getElementById('scheduleView'); sv.style.display='block';
  const todayStr=new Date().toISOString().slice(0,10);
  const yr=calYear, mo=calMonth;
  const firstDay=new Date(yr,mo,1).getDay();
  const daysInMonth=new Date(yr,mo+1,0).getDate();
  const daysInPrev=new Date(yr,mo,0).getDate();
  const MN=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  const schedByDate={};
  schedules.forEach(s=>{if(s.date){if(!schedByDate[s.date])schedByDate[s.date]=[];schedByDate[s.date].push(s);}});
  let cells='';
  const total=Math.ceil((firstDay+daysInMonth)/7)*7;
  for(let i=0;i<total;i++){
    let d,dateStr,isOther=false;
    if(i<firstDay){d=daysInPrev-firstDay+i+1;const dt=new Date(yr,mo-1,d);dateStr=dt.toISOString().slice(0,10);isOther=true;}
    else if(i>=firstDay+daysInMonth){d=i-firstDay-daysInMonth+1;const dt=new Date(yr,mo+1,d);dateStr=dt.toISOString().slice(0,10);isOther=true;}
    else{d=i-firstDay+1;const dt=new Date(yr,mo,d);dateStr=dt.toISOString().slice(0,10);}
    const dow=i%7, isToday=dateStr===todayStr, hasEv=schedByDate[dateStr]?.length>0;
    const chips=schedByDate[dateStr]?.slice(0,2).map(s=>`<div class="cal-chip">${s.title}</div>`).join('')||'';
    const dc=dow===0?'sun':dow===6?'sat':'';
    cells+=`<div class="cal-cell${isOther?' other':''}${isToday?' today':''}${hasEv?' has-ev':''}" onclick="onCalDayClick('${dateStr}')">
      <div class="cal-dn ${dc}">${d}</div>${chips}</div>`;
  }
  const upcoming=schedules.filter(s=>s.date>=todayStr).sort((a,b)=>a.date.localeCompare(b.date));
  const past=schedules.filter(s=>s.date<todayStr).sort((a,b)=>b.date.localeCompare(a.date)).slice(0,5);
  sv.innerHTML=`<div class="cal-wrap fade-in">
    <div class="cal-header">
      <div class="cal-nav">
        <button class="btn btn-sm" onclick="calNav(-1)">◀</button>
        <button class="btn btn-sm" onclick="calNav(0)">오늘</button>
        <button class="btn btn-sm" onclick="calNav(1)">▶</button>
      </div>
      <div class="cal-title">${yr}년 ${MN[mo]}</div>
      <button class="btn btn-primary" onclick="openAddScheduleModal()">＋ 일정 추가</button>
    </div>
    <div class="cal-grid">
      <div class="cal-dh sun">일</div><div class="cal-dh">월</div><div class="cal-dh">화</div><div class="cal-dh">수</div><div class="cal-dh">목</div><div class="cal-dh">금</div><div class="cal-dh sat">토</div>
      ${cells}
    </div>
    <div class="sched-list">
      ${upcoming.length?`<div class="sched-sec">📌 다가오는 일정 (${upcoming.length}건)</div>`+upcoming.map(s=>schedCard(s)).join(''):''}
      ${past.length?`<div class="sched-sec" style="margin-top:16px;">🕐 지난 일정</div>`+past.map(s=>schedCard(s)).join(''):''}
      ${!upcoming.length&&!past.length?`<div class="empty-state" style="padding:40px;"><div style="font-size:40px;">📅</div><div>등록된 일정이 없습니다</div><button class="btn btn-primary" onclick="openAddScheduleModal()" style="margin-top:12px;">＋ 첫 일정 추가</button></div>`:''}
    </div>
  </div>`;
}

function schedCard(s){
  const gcalUrl=makeGcalUrl(s);
  return`<div class="sched-card">
    <div class="sched-card-hd">
      <div class="sched-ttl">${s.title}</div>
      <div style="display:flex;gap:5px;flex-shrink:0;">
        <button class="btn btn-sm" onclick="openEditSchedule('${s.id}')">✏️</button>
        <button class="btn btn-sm btn-red" onclick="deleteSchedule('${s.id}')">🗑</button>
      </div>
    </div>
    <div class="sched-meta">
      <div class="sched-mi">📅 <strong>${s.date}</strong>${s.time?' '+s.time:''}</div>
      ${s.place?`<div class="sched-mi">📍 ${s.place}</div>`:''}
      ${s.attendees?`<div class="sched-mi">👥 ${s.attendees}</div>`:''}
    </div>
    ${s.memo?`<div class="sched-memo">${s.memo}</div>`:''}
    <div class="sched-actions">
      <a href="${gcalUrl}" target="_blank" class="btn btn-gcal">📆 구글 캘린더에 추가</a>
      ${s.fileName?`<span class="sched-file" onclick="viewFile('${s.id}')">📎 ${s.fileName}</span>`:''}
    </div>
  </div>`;
}

function makeGcalUrl(s){
  const d=s.date.replace(/-/g,'');
  let start=d, end=d;
  if(s.time){
    const[h,m]=s.time.split(':');
    start=d+'T'+s.time.replace(':','')+'00';
    const eh=String((parseInt(h)+1)%24).padStart(2,'0');
    end=d+'T'+eh+m+'00';
  }
  const details=[s.attendees?'참석: '+s.attendees:'',s.memo||''].filter(Boolean).join('\n');
  return`https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(s.title)}&dates=${start}/${end}&details=${encodeURIComponent(details)}&location=${encodeURIComponent(s.place||'')}`;
}

function calNav(dir){
  if(dir===0){calYear=new Date().getFullYear();calMonth=new Date().getMonth();}
  else{calMonth+=dir;if(calMonth>11){calMonth=0;calYear++;}else if(calMonth<0){calMonth=11;calYear--;}}
  renderScheduleView();
}
function onCalDayClick(dateStr){
  const evs=schedules.filter(s=>s.date===dateStr);
  if(evs.length===0){document.getElementById('sDate').value=dateStr;openAddScheduleModal();}
}
window.calNav=calNav; window.onCalDayClick=onCalDayClick;

// ── 파일 첨부 ──
function onFileSelect(e){
  const f=e.target.files[0]; if(!f)return;
  if(f.size>500*1024){showToast('500KB 이하만 가능합니다','error');return;}
  const fr=new FileReader();
  fr.onload=ev=>{tempFileData=ev.target.result;tempFileName=f.name;
    document.getElementById('filePreview').style.display='flex';
    document.getElementById('filePreviewName').textContent=f.name;
  }; fr.readAsDataURL(f);
}
function clearFile(){tempFileData=null;tempFileName=null;document.getElementById('sFileInput').value='';document.getElementById('filePreview').style.display='none';}
function viewFile(id){const s=schedules.find(x=>x.id===id);if(!s?.fileData)return;const a=document.createElement('a');a.href=s.fileData;a.download=s.fileName||'file';a.click();}
window.onFileSelect=onFileSelect; window.clearFile=clearFile; window.viewFile=viewFile;

// ── 일정 CRUD ──
function openAddScheduleModal(){
  document.getElementById('editScheduleId').value='';
  document.getElementById('schedModalTitle').textContent='📅 일정 추가';
  ['sTitle','sPlace','sAttendees','sMemo'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('sTime').value='';
  if(!document.getElementById('sDate').value) document.getElementById('sDate').value=new Date().toISOString().slice(0,10);
  clearFile(); openModal('addScheduleModal');
}
function openEditSchedule(id){
  const s=schedules.find(x=>x.id===id); if(!s)return;
  document.getElementById('editScheduleId').value=s.id;
  document.getElementById('schedModalTitle').textContent='✏️ 일정 수정';
  document.getElementById('sTitle').value=s.title||'';
  document.getElementById('sDate').value=s.date||'';
  document.getElementById('sTime').value=s.time||'';
  document.getElementById('sPlace').value=s.place||'';
  document.getElementById('sAttendees').value=s.attendees||'';
  document.getElementById('sMemo').value=s.memo||'';
  if(s.fileName){tempFileData=s.fileData;tempFileName=s.fileName;
    document.getElementById('filePreview').style.display='flex';
    document.getElementById('filePreviewName').textContent=s.fileName;
  }else clearFile();
  openModal('addScheduleModal');
}
function saveSchedule(){
  const title=document.getElementById('sTitle').value.trim(); if(!title){alert('제목을 입력하세요');return;}
  const date=document.getElementById('sDate').value; if(!date){alert('날짜를 입력하세요');return;}
  const editId=document.getElementById('editScheduleId').value;
  const data={title,date,time:document.getElementById('sTime').value,place:document.getElementById('sPlace').value,
    attendees:document.getElementById('sAttendees').value,memo:document.getElementById('sMemo').value,
    fileData:tempFileData||null,fileName:tempFileName||null};
  if(editId){const s=schedules.find(x=>x.id===editId);if(s)Object.assign(s,data);}
  else schedules.push({id:genId(),...data,createdAt:new Date().toISOString()});
  save(); closeModal('addScheduleModal'); renderScheduleView(); showToast('일정 저장됨 ✅','success');
}
function deleteSchedule(id){if(!confirm('일정을 삭제하시겠습니까?'))return;schedules=schedules.filter(s=>s.id!==id);save();renderScheduleView();}
window.openAddScheduleModal=openAddScheduleModal; window.openEditSchedule=openEditSchedule;
window.saveSchedule=saveSchedule; window.deleteSchedule=deleteSchedule;

// ── 네트워크 ──
let netNodes=[],netEdges=[],netDrag=null,netOffX=0,netOffY=0,netScale=1,isPan=false,panS=null,nMX=0,nMY=0;
function renderNetwork(){
  const nv=document.getElementById('networkView');nv.style.display='flex';
  const c=document.getElementById('networkCanvas');c.width=nv.offsetWidth;c.height=nv.offsetHeight;
  netNodes=persons.map((p,i)=>{const a=(i/persons.length)*Math.PI*2,r=Math.min(c.width,c.height)*.32;
    return{id:p.id,name:p.name,x:c.width/2+Math.cos(a)*r,y:c.height/2+Math.sin(a)*r,size:8+(p.politicalInfluence||0)*3,color:getAC(p.name)};});
  netEdges=relations.map(r=>({from:r.fromId,to:r.toId,closeness:r.closeness}));
  drawNet();
  c.onmousedown=e=>{const pos=mp(c,e);const n=nodeAt(pos.x,pos.y);if(n){netDrag=n;nMX=pos.x-n.x;nMY=pos.y-n.y;}else{isPan=true;panS={x:e.clientX-netOffX,y:e.clientY-netOffY};}};
  c.onmousemove=e=>{const pos=mp(c,e);if(netDrag){netDrag.x=pos.x-nMX;netDrag.y=pos.y-nMY;drawNet();}
    else if(isPan){netOffX=e.clientX-panS.x;netOffY=e.clientY-panS.y;drawNet();}
    else{const n=nodeAt(pos.x,pos.y);const tt=document.getElementById('netTooltip');
      if(n){const p=persons.find(x=>x.id===n.id);tt.style.display='block';tt.style.left=(e.offsetX+14)+'px';tt.style.top=(e.offsetY+14)+'px';tt.textContent=`${n.name} | ${p?.party||'무소속'}`;}
      else tt.style.display='none';}};
  c.onmouseup=()=>{netDrag=null;isPan=false;};
  c.onclick=e=>{const pos=mp(c,e);const n=nodeAt(pos.x,pos.y);if(n){selectedId=n.id;switchView('list');}};
  c.onwheel=e=>{e.preventDefault();netScale=Math.max(.3,Math.min(3,netScale*(e.deltaY>0?.9:1.1)));drawNet();};
}
const mp=(c,e)=>{const r=c.getBoundingClientRect();return{x:e.clientX-r.left,y:e.clientY-r.top};};
const nodeAt=(mx,my)=>{for(const n of netNodes){const dx=mx-(n.x*netScale+netOffX),dy=my-(n.y*netScale+netOffY);if(Math.sqrt(dx*dx+dy*dy)<n.size*netScale+5)return n;}return null;};
function drawNet(){
  const c=document.getElementById('networkCanvas'),ctx=c.getContext('2d');
  ctx.clearRect(0,0,c.width,c.height);ctx.save();ctx.translate(netOffX,netOffY);ctx.scale(netScale,netScale);
  netEdges.forEach(e=>{const a=netNodes.find(n=>n.id===e.from),b=netNodes.find(n=>n.id===e.to);if(!a||!b)return;
    ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.strokeStyle=`rgba(88,166,255,${.1+(e.closeness/100)*.7})`;ctx.lineWidth=.5+(e.closeness/100)*3;ctx.stroke();});
  netNodes.forEach(n=>{const sel=selectedId===n.id;
    ctx.beginPath();ctx.arc(n.x,n.y,n.size+(sel?4:0),0,Math.PI*2);ctx.fillStyle=sel?n.color.border:n.color.bg;ctx.fill();
    ctx.strokeStyle=n.color.border;ctx.lineWidth=sel?3:1.5;ctx.stroke();
    ctx.fillStyle=n.color.text;ctx.font=`${sel?13:11}px "Noto Sans KR",sans-serif`;ctx.textAlign='center';ctx.fillText(n.name,n.x,n.y+n.size+14);});
  ctx.restore();
}

// ── 관리자 ──
function renderAdmin(){
  const av=document.getElementById('adminView');av.style.display='block';
  const mkSec=(key,title,icon)=>`<div class="admin-card">
    <div class="admin-card-title">${icon} ${title}</div>
    <div class="tag-list">${(cats[key]||[]).map((v,i)=>`<div class="editable-tag"><span>${v}</span><button class="del-btn" onclick="delCat('${key}',${i})">×</button></div>`).join('')}</div>
    <div class="add-tag-row"><input class="add-tag-input" id="ai_${key}" placeholder="${title} 추가..." onkeydown="if(event.key==='Enter')addCat('${key}')">
    <button class="btn btn-primary" style="font-size:12px;padding:6px 12px;" onclick="addCat('${key}')">＋</button></div>
  </div>`;
  const sidoBlocks=ALL_SIDO.map(s=>{const isOpen=openSido===s;
    return`<div class="sido-chip${isOpen?' open':''}" onclick="toggleSido('${s}')">
      <div class="sido-chip-name">${s}</div><div class="sido-chip-count">${SIDO_SIGUNGU[s].length}개</div>
      ${isOpen?`<div class="sigungu-list">${SIDO_SIGUNGU[s].map(sg=>`<span class="sigungu-item">${sg}</span>`).join('')}</div>`:''}
    </div>`;}).join('');
  av.innerHTML=`<div class="admin-wrap">
    <div class="admin-page-title">⚙️ 관리자 설정</div>
    <div class="admin-page-sub">정당, 관계 분류 드롭다운을 편집합니다.</div>
    <div class="admin-sections">${mkSec('parties','정당 목록','🏛️')}${mkSec('relTypes','관계 분류','🔖')}</div>
    <div class="divider"></div>
    <div style="margin-bottom:14px;">
      <div style="font-size:14px;font-weight:700;margin-bottom:4px;">📍 지역 데이터</div>
      <div style="font-size:13px;color:var(--text2);margin-bottom:10px;">총 ${Object.values(SIDO_SIGUNGU).flat().length}개 기초자치단체</div>
      <div class="region-preview-grid">${sidoBlocks}</div>
    </div>
    <div class="divider"></div>
    <div>
      <div style="font-size:14px;font-weight:700;margin-bottom:12px;">🗄️ 데이터 관리</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;">
        <button class="btn" onclick="exportData()">📥 JSON 내보내기</button>
        <button class="btn" onclick="document.getElementById('importFile').click()">📤 JSON 가져오기</button>
        <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
        <button class="btn btn-red" onclick="clearAll()">🗑 전체 초기화</button>
      </div>
      <div style="padding:12px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;font-size:13px;color:var(--text2);">
        인물 <strong style="color:var(--text)">${persons.length}명</strong> · 만남 <strong style="color:var(--text)">${meetings.length}건</strong> · 관계 <strong style="color:var(--text)">${relations.length}건</strong> · 일정 <strong style="color:var(--text)">${schedules.length}건</strong>
      </div>
    </div>
  </div>`;
}
function toggleSido(s){openSido=openSido===s?null:s;renderAdmin();}
function addCat(key){const inp=document.getElementById('ai_'+key);const v=inp.value.trim();if(!v)return;if(!cats[key].includes(v))cats[key].push(v);inp.value='';save();renderAdmin();populateFilters();populateModal();}
function delCat(key,idx){cats[key].splice(idx,1);save();renderAdmin();populateFilters();populateModal();}
function exportData(){const blob=new Blob([JSON.stringify({persons,meetings,relations,schedules,cats},null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='인맥관리_'+new Date().toISOString().slice(0,10)+'.json';a.click();}
function importData(e){const f=e.target.files[0];if(!f)return;const fr=new FileReader();fr.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(d.persons)persons=d.persons;if(d.meetings)meetings=d.meetings;if(d.relations)relations=d.relations;if(d.schedules)schedules=d.schedules;if(d.cats)cats=d.cats;save();renderPersonList();populateFilters();populateModal();renderAdmin();alert('가져오기 완료!');}catch{alert('올바른 JSON 파일이 아닙니다.');}};fr.readAsText(f);}
async function clearAll(){if(!confirm('모든 데이터를 초기화합니까?'))return;persons=[];meetings=[];relations=[];schedules=[];await save();selectedId=null;renderPersonList();renderAdmin();showToast('초기화 완료','success');}
window.toggleSido=toggleSido; window.addCat=addCat; window.delCat=delCat;
window.exportData=exportData; window.importData=importData; window.clearAll=clearAll;

// ── 뷰 전환 ──
function switchView(view){
  currentView=view;
  document.querySelectorAll('.view-tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.bnav-btn').forEach(t=>t.classList.remove('active'));
  const dt=document.getElementById('tab-'+view); if(dt)dt.classList.add('active');
  const db=document.getElementById('bnav-'+view); if(db)db.classList.add('active');
  if(!isMobile()) document.getElementById('sidebarEl').style.display=(view==='list'||view==='grid')?'':'none';
  ['emptyState','detailView','gridView','scheduleView','networkView','adminView'].forEach(i=>document.getElementById(i).style.display='none');
  document.getElementById('addSchedBtnTop').style.display=view==='schedule'?'inline-flex':'none';
  if(view==='list'){if(selectedId)showDetail(selectedId);else document.getElementById('emptyState').style.display='flex';}
  else if(view==='grid'){renderPersonList();renderGridView();}
  else if(view==='schedule')renderScheduleView();
  else if(view==='network')renderNetwork();
  else if(view==='admin')renderAdmin();
  if(isMobile())closeSidebar();
}
window.switchView=switchView;

// ── 모달 ──
function openModal(id){document.getElementById(id).classList.add('show');}
function closeModal(id){document.getElementById(id).classList.remove('show');}
window.openModal=openModal; window.closeModal=closeModal;
document.querySelectorAll('.modal-overlay').forEach(o=>o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('show');}));

// ── 인물 CRUD ──
function openAddPersonModal(){
  document.getElementById('editPersonId').value='';
  ['pName','pCompany','pDuty','pPhone','pMemo'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('pSex').value=''; document.getElementById('pBirth').value='';
  document.getElementById('pParty').value=''; document.getElementById('pRelation').value='';
  document.getElementById('pSido').value=''; document.getElementById('pSigungu').innerHTML='<option value="">-</option>';
  tempPolStar=0; tempLocStar=0; updateStarUI('pPoliticalStars',0); updateStarUI('pLocalStars',0);
  document.getElementById('personModalTitle').textContent='👤 인물 추가'; openModal('addPersonModal');
}
function openEditModal(id){
  const p=persons.find(x=>x.id===id); if(!p)return;
  document.getElementById('editPersonId').value=p.id;
  document.getElementById('pName').value=p.name||''; document.getElementById('pCompany').value=p.company||'';
  document.getElementById('pDuty').value=p.duty||''; document.getElementById('pPhone').value=p.phone||'';
  document.getElementById('pMemo').value=p.memo||''; document.getElementById('pSex').value=p.sex||'';
  document.getElementById('pBirth').value=p.birth||''; document.getElementById('pParty').value=p.party||'';
  document.getElementById('pRelation').value=p.relation||''; document.getElementById('pSido').value=p.sido||'';
  if(p.sido&&SIDO_SIGUNGU[p.sido]){
    document.getElementById('pSigungu').innerHTML='<option value="">-</option>'+SIDO_SIGUNGU[p.sido].map(s=>`<option>${s}</option>`).join('');
    document.getElementById('pSigungu').value=p.sigungu||'';
  }else document.getElementById('pSigungu').innerHTML='<option value="">-</option>';
  tempPolStar=p.politicalInfluence||0; tempLocStar=p.localInfluence||0;
  updateStarUI('pPoliticalStars',tempPolStar); updateStarUI('pLocalStars',tempLocStar);
  document.getElementById('personModalTitle').textContent='✏️ 인물 수정'; openModal('addPersonModal');
}
function setPStar(type,val){if(type==='p'){tempPolStar=val;updateStarUI('pPoliticalStars',val);}else{tempLocStar=val;updateStarUI('pLocalStars',val);}}
function updateStarUI(id,val){document.getElementById(id).querySelectorAll('.star-btn').forEach((b,i)=>b.textContent=i<val?'⭐':'☆');}
function savePerson(){
  const name=document.getElementById('pName').value.trim(); if(!name){alert('이름을 입력하세요');return;}
  const editId=document.getElementById('editPersonId').value;
  const data={name,company:document.getElementById('pCompany').value,duty:document.getElementById('pDuty').value,
    phone:document.getElementById('pPhone').value,memo:document.getElementById('pMemo').value,
    sex:document.getElementById('pSex').value,birth:document.getElementById('pBirth').value,
    party:document.getElementById('pParty').value,relation:document.getElementById('pRelation').value,
    sido:document.getElementById('pSido').value,sigungu:document.getElementById('pSigungu').value,
    politicalInfluence:tempPolStar,localInfluence:tempLocStar};
  if(editId){const p=persons.find(x=>x.id===editId);if(p)Object.assign(p,data);}
  else persons.push({id:genId(),...data,events:[],createdAt:new Date().toISOString()});
  save(); closeModal('addPersonModal'); renderPersonList();
  if(editId&&selectedId===editId)showDetail(editId);
}
function deletePerson(id){
  if(!confirm('이 인물을 삭제하시겠습니까?'))return;
  persons=persons.filter(p=>p.id!==id); meetings=meetings.filter(m=>m.personId!==id); relations=relations.filter(r=>r.fromId!==id&&r.toId!==id);
  save(); selectedId=null; renderPersonList(); document.getElementById('detailView').style.display='none'; document.getElementById('emptyState').style.display='flex';
}
window.openAddPersonModal=openAddPersonModal; window.openEditModal=openEditModal;
window.setPStar=setPStar; window.savePerson=savePerson; window.deletePerson=deletePerson;

// ── 이벤트 토글 ──
function toggleEvent(pid,evId){
  const p=persons.find(x=>x.id===pid); if(!p)return;
  if(!p.events)p.events=[];
  const idx=p.events.indexOf(evId);
  if(idx>=0)p.events.splice(idx,1); else p.events.push(evId);
  save(); showDetail(pid);
}
window.toggleEvent=toggleEvent;

// ── 만남 CRUD ──
function openMeetingModal(pid){
  document.getElementById('meetingPersonId').value=pid;
  document.getElementById('mDate').value=new Date().toISOString().slice(0,10);
  ['mPlace','mWith','mMemo','mEval'].forEach(id=>document.getElementById(id).value='');
  tempMeetStar=3; updateStarUI('meetingStars',3); openModal('addMeetingModal');
}
function setMStar(val){tempMeetStar=val;updateStarUI('meetingStars',val);}
function saveMeeting(){
  const pid=document.getElementById('meetingPersonId').value, date=document.getElementById('mDate').value;
  if(!date){alert('날짜를 입력하세요');return;}
  meetings.push({id:genId(),personId:pid,date,place:document.getElementById('mPlace').value,
    with:document.getElementById('mWith').value,memo:document.getElementById('mMemo').value,
    eval:document.getElementById('mEval').value,rating:tempMeetStar,createdAt:new Date().toISOString()});
  save(); closeModal('addMeetingModal'); if(selectedId)showDetail(selectedId);
}
function deleteMeeting(id){meetings=meetings.filter(m=>m.id!==id);save();if(selectedId)showDetail(selectedId);}
window.openMeetingModal=openMeetingModal; window.setMStar=setMStar; window.saveMeeting=saveMeeting; window.deleteMeeting=deleteMeeting;

// ── 관계 CRUD ──
function openRelationModal(fromId){
  document.getElementById('relFromId').value=fromId;
  document.getElementById('relClose').value=50; document.getElementById('relCloseVal').textContent='50';
  document.getElementById('relMemo').value='';
  document.getElementById('relToId').innerHTML=persons.filter(p=>p.id!==fromId).map(p=>`<option value="${p.id}">${p.name}</option>`).join('');
  openModal('addRelationModal');
}
function saveRelation(){
  const fromId=document.getElementById('relFromId').value, toId=document.getElementById('relToId').value;
  if(!toId){alert('상대방을 선택하세요');return;}
  relations.push({id:genId(),fromId,toId,closeness:parseInt(document.getElementById('relClose').value),
    type:document.getElementById('relType').value,memo:document.getElementById('relMemo').value});
  save(); closeModal('addRelationModal'); if(selectedId)showDetail(selectedId);
}
function deleteRelation(id){relations=relations.filter(r=>r.id!==id);save();if(selectedId)showDetail(selectedId);}
window.openRelationModal=openRelationModal; window.saveRelation=saveRelation; window.deleteRelation=deleteRelation;

// ── 초기화 ──
startRealtimeSync();
</script>
